<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión Estudiantil y Asistencia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800">

    <nav class="bg-indigo-600 text-white shadow-lg sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 py-3 flex flex-wrap justify-between items-center">
            <div class="flex items-center space-x-3">
                <i class="fa-solid fa-graduation-cap text-2xl text-amber-400"></i>
                <span class="text-xl font-bold tracking-tight">EduManager QR</span>
            </div>
            <div class="flex space-x-2 mt-2 sm:mt-0">
                <button onclick="exportarBackup()" class="bg-indigo-700 hover:bg-indigo-800 px-3 py-1.5 rounded-lg text-sm font-medium transition flex items-center gap-1">
                    <i class="fa-solid fa-download"></i> Exportar JSON
                </button>
                <label class="bg-amber-500 hover:bg-amber-600 px-3 py-1.5 rounded-lg text-sm font-medium transition flex items-center gap-1 cursor-pointer">
                    <i class="fa-solid fa-upload"></i> Importar JSON
                    <input type="file" id="importFile" accept=".json" class="hidden" onchange="importarBackup(event)">
                </label>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <div class="lg:col-span-1 space-y-6">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                <h2 class="text-lg font-bold mb-3 flex items-center gap-2 text-indigo-950">
                    <i class="fa-solid fa-qrcode text-indigo-600"></i> Control de Asistencia QR
                </h2>
                <button onclick="inicializarEscaneoQR()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3 px-4 rounded-xl shadow-md transition flex items-center justify-center gap-2">
                    <i class="fa-solid fa-camera"></i> Abrir Cámara Móvil
                </button>
                <div id="qr-reader-container" class="mt-4 hidden bg-slate-900 rounded-xl overflow-hidden p-2">
                    <div id="reader" class="w-full"></div>
                    <button onclick="detenerEscaneoQR()" class="w-full mt-2 bg-rose-600 hover:bg-rose-700 text-white text-xs py-1 rounded">Cancelar</button>
                </div>
            </div>

            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-bold text-indigo-950 flex items-center gap-2">
                        <i class="fa-solid fa-calendar-days text-indigo-600"></i> Calendario
                    </h2>
                    <span id="calendar-month-year" class="text-sm font-semibold bg-slate-100 px-3 py-1 rounded-full text-slate-600"></span>
                </div>
                <div class="calendar-grid text-center text-xs font-bold text-slate-400 mb-2">
                    <div>D</div><div>L</div><div>M</div><div>M</div><div>J</div><div>V</div><div>S</div>
                </div>
                <div id="calendar-days" class="calendar-grid"></div>
                <div class="mt-4 pt-3 border-t border-slate-100 flex justify-between text-xs text-slate-500">
                    <span class="flex items-center gap-1"><span class="w-2.5 h-2.5 bg-emerald-500 rounded-full inline-block"></span> Registros</span>
                    <button onclick="gestionarAsistenciasManuales()" class="text-indigo-600 hover:underline font-medium">Gestión manual manual</button>
                </div>
            </div>
        </div>

        <div class="lg:col-span-2 space-y-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-4">
                    <div>
                        <h2 class="text-xl font-bold text-indigo-950">Panel de Estudiantes</h2>
                        <p class="text-xs text-slate-400">Total: <span id="student-count">0</span> alumnos matriculados</p>
                    </div>
                    <button onclick="modalEstudiante()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium px-4 py-2 rounded-xl shadow transition text-sm flex items-center gap-2 w-full sm:w-auto justify-center">
                        <i class="fa-solid fa-user-plus"></i> Nuevo Estudiante
                    </button>
                </div>

                <div class="overflow-x-auto custom-scroll border border-slate-100 rounded-xl">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50 text-slate-500 text-xs uppercase font-semibold border-b border-slate-100">
                                <th class="p-3">DNI / Alumno</th>
                                <th class="p-3">Género & Edad</th>
                                <th class="p-3">Teléfono</th>
                                <th class="p-3 text-center">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="student-table-body" class="text-sm divide-y divide-slate-100">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        // 1. DATA INICIAL REQUERIDA (20 Registros Base)
        let estudiantes = [
            { dni: "72140598", nombres: "Liam Santiago", apellidos: "Mendoza Ruiz", genero: "Masculino", edad: 19, telefono: "984512367" },
            { dni: "45981230", nombres: "Valentina Sofía", apellidos: "Quispe Flores", genero: "Femenino", edad: 21, telefono: "951847623" },
            { dni: "70451928", nombres: "Mateo Alejandro", apellidos: "Huamán Castro", genero: "Masculino", edad: 18, telefono: "913465782" },
            { dni: "48123095", nombres: "Camila Belén", apellidos: "Mamani Ortiz", genero: "Femenino", edad: 22, telefono: "962154873" },
            { dni: "74102589", nombres: "Sebastian Alonso", Ramos: "Gutiérrez", apellidos: "Ramos Gutiérrez", genero: "Masculino", edad: 20, telefono: "974321658" },
            { dni: "41985236", nombres: "Valeria Nicole", apellidos: "Diaz Chávez", genero: "Femenino", edad: 23, telefono: "955781249" },
            { dni: "76321409", nombres: "Lucas Gabriel", apellidos: "Espinoza Torres", genero: "Masculino", edad: 19, telefono: "981654327" },
            { dni: "43521987", nombres: "Maria Fernanda", apellidos: "Rojas Salazar", genero: "Femenino", edad: 25, telefono: "942318765" },
            { dni: "71984523", nombres: "Diego Armando", apellidos: "Vargas Villanueva", genero: "Masculino", edad: 21, telefono: "936852147" },
            { dni: "46871235", nombres: "Daniela Alejandra", apellidos: "Silva Morales", genero: "Femenino", edad: 20, telefono: "993147258" },
            { dni: "75210496", nombres: "Nicolas André", apellidos: "Benitez Delgado", genero: "Masculino", edad: 18, telefono: "917634825" },
            { dni: "42159873", nombres: "Andrea Carolina", apellidos: "Palomino Rey", genero: "Femenino", edad: 24, telefono: "968451732" },
            { dni: "73459120", nombres: "Matias Eduardo", apellidos: "Cordero Paredes", genero: "Masculino", edad: 22, telefono: "953216874" },
            { dni: "49581236", nombres: "Luciana Jimena", apellidos: "Farfán Campos", genero: "Femenino", edad: 19, telefono: "987123456" },
            { dni: "70124589", nombres: "Samuel David", apellidos: "Guerrero Sandoval", genero: "Masculino", edad: 20, telefono: "924578163" },
            { dni: "47321598", nombres: "Antonella Beatriz", apellidos: "Cárdenas Meza", genero: "Femenino", edad: 21, telefono: "961852347" },
            { dni: "72894105", nombres: "Benjamin Isaac", apellidos: "Luna Aguilar", genero: "Masculino", edad: 23, telefono: "934712589" },
            { dni: "44102589", nombres: "Gabriela del Pilar", apellidos: "Nuñez Vega", genero: "Femenino", edad: 18, telefono: "957364128" },
            { dni: "71584923", nombres: "Joaquin Tomas", apellidos: "Rios Fuentes", genero: "Masculino", edad: 22, telefono: "915487236" },
            { dni: "46231985", nombres: "Flavia Alessandra", apellidos: "Soto Mendoza", genero: "Femenino", edad: 20, telefono: "996258147" }
        ];

        // Estructura de asistencias: { "YYYY-MM-DD": [ { dni, hora, metodo }, ... ] }
        let asistencias = {};
        let html5QrcodeScanner = null;
        let fechaSeleccionada = new Date().toISOString().split('T')[0];

        // Inicialización de la App
        window.addEventListener('DOMContentLoaded', () => {
            cargarDeLocalStorage();
            renderizarTabla();
            renderizarCalendario();
        });

        // 2. CONTROL CRUDS (ESTUDIANTES)
        function renderizarTabla() {
            const tbody = document.getElementById('student-table-body');
            document.getElementById('student-count').innerText = estudiantes.length;
            tbody.innerHTML = '';

            estudiantes.forEach(est => {
                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 transition">
                        <td class="p-3">
                            <div class="font-bold text-indigo-600 text-xs">${est.dni}</div>
                            <div class="text-slate-900 font-medium">${est.apellidos}, ${est.nombres}</div>
                        </td>
                        <td class="p-3">
                            <span class="text-xs px-2 py-0.5 rounded-full ${est.genero === 'Masculino' ? 'bg-blue-50 text-blue-600' : 'bg-pink-50 text-pink-600'} font-medium">${est.genero}</span>
                            <div class="text-xs text-slate-500 mt-0.5">${est.edad} años</div>
                        </td>
                        <td class="p-3 text-slate-600 text-xs font-mono">${est.telefono}</td>
                        <td class="p-3 text-center">
                            <div class="flex justify-center space-x-1">
                                <button onclick="modalEstudiante('${est.dni}')" class="p-1.5 bg-amber-50 text-amber-600 hover:bg-amber-100 rounded-lg transition" title="Editar"><i class="fa-solid fa-pen"></i></button>
                                <button onclick="eliminarEstudiante('${est.dni}')" class="p-1.5 bg-rose-50 text-rose-600 hover:bg-rose-100 rounded-lg transition" title="Eliminar"><i class="fa-solid fa-trash"></i></button>
                            </div>
                        </td>
                    </tr>
                `;
            });
        }

        async function modalEstudiante(dni = null) {
            const est = estudiantes.find(e => e.dni === dni) || { dni:'', nombres:'', apellidos:'', genero:'Masculino', edad:'', telefono:'' };
            const esEdicion = dni !== null;

            const { value: formValues } = await Swal.fire({
                title: esEdicion ? 'Editar Estudiante' : 'Nuevo Estudiante',
                html: `
                    <input id="swal-dni" class="swal2-input" placeholder="DNI" value="${est.dni}" ${esEdicion ? 'disabled' : ''}>
                    <input id="swal-nombres" class="swal2-input" placeholder="Nombres" value="${est.nombres}">
                    <input id="swal-apellidos" class="swal2-input" placeholder="Apellidos" value="${est.apellidos}">
                    <select id="swal-genero" class="swal2-input">
                        <option value="Masculino" ${est.genero === 'Masculino' ? 'selected' : ''}>Masculino</option>
                        <option value="Femenino" ${est.genero === 'Femenino' ? 'selected' : ''}>Femenino</option>
                    </select>
                    <input id="swal-edad" type="number" class="swal2-input" placeholder="Edad" value="${est.edad}">
                    <input id="swal-telefono" class="swal2-input" placeholder="Teléfono" value="${est.telefono}">
                `,
                focusConfirm: false,
                showCancelButton: true,
                confirmButtonText: 'Guardar',
                cancelButtonText: 'Cancelar',
                confirmButtonColor: '#4f46e5',
                preConfirm: () => {
                    const d = document.getElementById('swal-dni').value.trim();
                    const n = document.getElementById('swal-nombres').value.trim();
                    const a = document.getElementById('swal-apellidos').value.trim();
                    const g = document.getElementById('swal-genero').value;
                    const e = document.getElementById('swal-edad').value;
                    const t = document.getElementById('swal-telefono').value.trim();

                    if(!d || !n || !a || !e || !t) {
                        Swal.showValidationMessage('Por favor completa todos los campos');
                        return false;
                    }
                    if(!esEdicion && estudiantes.some(x => x.dni === d)) {
                        Swal.showValidationMessage('El DNI ingresado ya existe');
                        return false;
                    }
                    return { dni: d, nombres: n, apellidos: a, genero: g, edad: parseInt(e), telefono: t };
                }
            });

            if (formValues) {
                if (esEdicion) {
                    const idx = estudiantes.findIndex(e => e.dni === dni);
                    estudiantes[idx] = { ...estudiantes[idx], ...formValues };
                } else {
                    estudiantes.push(formValues);
                }
                guardarYActualizar("Información guardada exitosamente.");
            }
        }

        function eliminarEstudiante(dni) {
            Swal.fire({
                title: '¿Estás seguro?',
                text: `Se eliminará el estudiante con DNI ${dni} y sus asistencias asociadas.`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#e11d48',
                confirmButtonText: 'Sí, eliminar',
                cancelButtonText: 'Cancelar'
            }).then((result) => {
                if (result.isConfirmed) {
                    estudiantes = estudiantes.filter(e => e.dni !== dni);
                    Object.keys(asistencias).forEach(fecha => {
                        asistencias[fecha] = asistencias[fecha].filter(a => a.dni !== dni);
                    });
                    guardarYActualizar("Estudiante removido de la base de datos.");
                }
            });
        }

        // 3. SECCIÓN CALENDARIO Y GESTIÓN MANUAL DE ASISTENCIAS
        function renderizarCalendario() {
            const contenedorDías = document.getElementById('calendar-days');
            const tituloMesAno = document.getElementById('calendar-month-year');
            const hoy = new Date();
            const año = hoy.getFullYear();
            const mes = hoy.getMonth();

            const nombresMeses = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
            tituloMesAno.innerText = `${nombresMeses[mes]} ${año}`;

            const primerDiaMes = new Date(año, mes, 1).getDay();
            const totalDiasMes = new Date(año, mes + 1, 0).getDate();

            contenedorDías.innerHTML = '';

            // Espacios en blanco para días del mes anterior
            for (let i = 0; i < primerDiaMes; i++) {
                contenedorDías.innerHTML += `<div></div>`;
            }

            // Días del mes corriente
            for (let dia = 1; dia <= totalDiasMes; dia++) {
                const cadenaFecha = `${año}-${String(mes + 1).padStart(2, '0')}-${String(dia).padStart(2, '0')}`;
                const tieneAsistencias = asistencias[cadenaFecha] && asistencias[cadenaFecha].length > 0;
                const esHoy = cadenaFecha === hoy.toISOString().split('T')[0];

                contenedorDías.innerHTML += `
                    <button onclick="verAsistenciaPorFecha('${cadenaFecha}')" class="p-1.5 rounded-lg text-xs font-semibold flex flex-col items-center justify-center transition
                        ${esHoy ? 'bg-indigo-600 text-white shadow-sm' : 'bg-slate-100 text-slate-700 hover:bg-slate-200'} relative">
                        ${dia}
                        ${tieneAsistencias ? `<span class="w-1.5 h-1.5 bg-emerald-500 rounded-full absolute bottom-0.5"></span>` : ''}
                    </button>
                `;
            }
        }

        function registrarAsistenciaInterna(dni, metodo = "QR") {
            const alumno = estudiantes.find(e => e.dni === dni);
            if (!alumno) return { success: false, msg: `DNI ${dni} no corresponde a ningún alumno matriculado.` };

            const hoy = new Date().toISOString().split('T')[0];
            const hora = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            if (!asistencias[hoy]) asistencias[hoy] = [];

            // Evitar duplicados el mismo día
            if (asistencias[hoy].some(a => a.dni === dni)) {
                return { success: false, msg: `${alumno.nombres} ya registró asistencia el día de hoy.` };
            }

            asistencias[hoy].push({ dni, hora, metodo });
            guardarYActualizar();
            return { success: true, msg: `Asistencia registrada para ${alumno.nombres} ${alumno.apellidos}.` };
        }

        function verAsistenciaPorFecha(fecha) {
            fechaSeleccionada = fecha;
            const lista = asistencias[fecha] || [];
            
            let htmlLista = `<div class="text-left text-sm max-h-60 overflow-y-auto custom-scroll border rounded-xl p-2 bg-slate-50">`;
            if (lista.length === 0) {
                htmlLista += `<p class="text-slate-400 text-center py-4">No hay asistencias registradas en esta fecha.</p>`;
            } else {
                lista.forEach(asist => {
                    const al = estudiantes.find(e => e.dni === asist.dni) || { nombres: 'Desconocido', apellidos: '' };
                    htmlLista += `
                        <div class="flex justify-between items-center py-2 border-b border-slate-200 last:border-none">
                            <div>
                                <span class="font-bold text-slate-700">${al.apellidos}, ${al.nombres}</span>
                                <span class="block text-xs text-slate-400">DNI: ${asist.dni} | Vía ${asist.metodo}</span>
                            </div>
                            <div class="flex items-center gap-2">
                                <span class="bg-indigo-50 text-indigo-600 text-xs px-2 py-0.5 rounded font-mono font-semibold">${asist.hora}</span>
                                <button onclick="removerAsistencia('${fecha}', '${asist.dni}')" class="text-rose-600 hover:text-rose-800 p-1"><i class="fa-solid fa-circle-minus"></i></button>
                            </div>
                        </div>`;
                });
            }
            htmlLista += `</div>`;

            Swal.fire({
                title: `Asistencias: ${fecha}`,
                html: htmlLista,
                showCancelButton: true,
                confirmButtonText: '<i class="fa-solid fa-plus"></i> Añadir Manual',
                cancelButtonText: 'Cerrar',
                confirmButtonColor: '#4f46e5'
            }).then((result) => {
                if (result.isConfirmed) {
                    abrirAsistenciaManualParaFecha(fecha);
                }
            });
        }

        function abrirAsistenciaManualParaFecha(fecha) {
            let opciones = estudiantes.map(e => `<option value="${e.dni}">${e.apellidos}, ${e.nombres} (${e.dni})</option>`).join('');
            
            Swal.fire({
                title: 'Registro Manual',
                html: `
                    <p class="text-xs text-slate-400 mb-2">Asignando asistencia para el: <b>${fecha}</b></p>
                    <select id="manual-student-select" class="swal2-input">${opciones}</select>
                    <input id="manual-student-time" type="time" class="swal2-input" value="${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', hour12: false})}">
                `,
                showCancelButton: true,
                confirmButtonText: 'Registrar',
                confirmButtonColor: '#10b981',
                preConfirm: () => {
                    return {
                        dni: document.getElementById('manual-student-select').value,
                        hora: document.getElementById('manual-student-time').value
                    }
                }
            }).then((result) => {
                if (result.isConfirmed) {
                    const data = result.value;
                    if (!asistencias[fecha]) asistencias[fecha] = [];
                    
                    if (asistencias[fecha].some(a => a.dni === data.dni)) {
                        Swal.fire('Atención', 'El estudiante ya figura en la lista de este día.', 'warning');
                    } else {
                        asistencias[fecha].push({ dni: data.dni, hora: data.hora, metodo: "Manual" });
                        guardarYActualizar();
                        verAsistenciaPorFecha(fecha); // Refrescar modal
                    }
                }
            });
        }

        function removerAsistencia(fecha, dni) {
            asistencias[fecha] = asistencias[fecha].filter(a => a.dni !== dni);
            guardarYActualizar();
            Swal.close();
            verAsistenciaPorFecha(fecha);
        }

        function gestionarAsistenciasManuales() {
            const hoy = new Date().toISOString().split('T')[0];
            verAsistenciaPorFecha(hoy);
        }

        // 4. INTEGRACIÓN DE CÁMARA & ESCANEO QR
        function inicializarEscaneoQR() {
            document.getElementById('qr-reader-container').classList.remove('hidden');
            html5QrcodeScanner = new Html5Qrcode("reader");
            
            // Configuración optimizada para cámaras traseras de dispositivos móviles
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };
            
            html5QrcodeScanner.start(
                { facingMode: "environment" }, 
                config,
                (decodedText) => {
                    // Acción al leer código de barras / QR exitosamente
                    detenerEscaneoQR();
                    const resultado = registrarAsistenciaInterna(decodedText.trim(), "QR");
                    
                    if(resultado.success) {
                        Swal.fire('¡Éxito!', resultado.msg, 'success');
                    } else {
                        Swal.fire('Información', resultado.msg, 'info');
                    }
                },
                (errorMessage) => { /* Silenciar logs redundantes de escaneo continuo */ }
            ).catch(err => {
                Swal.fire('Error de Acceso', 'No se pudo activar la cámara. Verifique los permisos de su dispositivo u HTTPS.', 'error');
                document.getElementById('qr-reader-container').classList.add('hidden');
            });
        }

        function detenerEscaneoQR() {
            if (html5QrcodeScanner) {
                html5QrcodeScanner.stop().then(() => {
                    document.getElementById('qr-reader-container').classList.add('hidden');
                }).catch(err => console.error("Error deteniendo el scanner:", err));
            }
        }

        // 5. BACKUPS (IMPORTAR/EXPORTAR JSON)
        function exportarBackup() {
            const backupData = { estudiantes, asistencias };
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(backupData, null, 2));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", `Backup_Sistema_${new Date().toISOString().split('T')[0]}.json`);
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        }

        function importarBackup(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const parsed = JSON.parse(e.target.result);
                    if(parsed.estudiantes && parsed.asistencias) {
                        estudiantes = parsed.estudiantes;
                        asistencias = parsed.asistencias;
                        guardarYActualizar("Backup restaurado correctamente.");
                    } else {
                        Swal.fire('Error', 'El formato del archivo JSON no contiene la estructura requerida.', 'error');
                    }
                } catch (err) {
                    Swal.fire('Error', 'Archivo JSON dañado o inválido.', 'error');
                }
            };
            reader.readAsText(file);
            event.target.value = ''; // Limpiar input
        }

        // 6. PERSISTENCIA LOCAL STORAGE
        function guardarYActualizar(mensajeSwal = null) {
            localStorage.setItem('EMS_estudiantes', JSON.stringify(estudiantes));
            localStorage.setItem('EMS_asistencias', JSON.stringify(asistencias));
            renderizarTabla();
            renderizarCalendario();
            if(mensajeSwal) {
                Swal.fire({ title: 'Actualizado', text: mensajeSwal, icon: 'success', timer: 1500, showConfirmButton: false });
            }
        }

        function cargarDeLocalStorage() {
            const localEst = localStorage.getItem('EMS_estudiantes');
            const localAsis = localStorage.getItem('EMS_asistencias');
            if (localEst) estudiantes = JSON.parse(localEst);
            if (localAsis) asistencias = JSON.parse(localAsis);
        }
    </script>
</body>
</html>

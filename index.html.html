<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistema Gestión de Papas</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
padding:20px;
}

header{
background:#2e7d32;
color:white;
padding:15px;
border-radius:10px;
margin-bottom:20px;
}

h1{
text-align:center;
}

.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-bottom:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
text-align:center;
}

.actions{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:20px;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
color:white;
}

.add{background:#4caf50;}
.export{background:#1976d2;}
.import{background:#ff9800;}
.qr{background:#9c27b0;}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th{
background:#2e7d32;
color:white;
}

th,td{
padding:10px;
border:1px solid #ddd;
}

input[type=date]{
padding:10px;
margin-top:10px;
}

#reader{
width:300px;
margin:auto;
margin-top:20px;
}

</style>
</head>
<body>

<header>
<h1>Gestión de Productos de Papa</h1>
</header>

<div class="dashboard">

<div class="card">
<h3>Total Productos</h3>
<h2 id="totalProductos">0</h2>
</div>

<div class="card">
<h3>Precio Promedio</h3>
<h2 id="promedio">0</h2>
</div>

</div>

<div class="actions">

<button class="add" onclick="nuevoProducto()">
Registrar Producto
</button>

<button class="export" onclick="exportarJSON()">
Exportar JSON
</button>

<button class="import" onclick="document.getElementById('importFile').click()">
Importar JSON
</button>

<button class="qr" onclick="abrirQR()">
Escanear QR
</button>

<input type="file"
id="importFile"
accept=".json"
hidden>

</div>

<h3>Calendario de Seguimiento</h3>
<input type="date">

<br><br>

<table>

<thead>
<tr>
<th>ID</th>
<th>Tipo</th>
<th>Vitaminas</th>
<th>Origen</th>
<th>Cosecha</th>
<th>Precio</th>
<th>Acciones</th>
</tr>
</thead>

<tbody id="tabla"></tbody>

</table>

<div id="reader"></div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script src="https://unpkg.com/html5-qrcode"></script>

<script>

let productos = JSON.parse(localStorage.getItem("papas")) || [

{id:1,tipo:"Papa Canchán",vit:"Vitamina C",origen:"Junín",fecha:"2026-05-15",precio:2.8},
{id:2,tipo:"Papa Yungay",vit:"Vitamina C",origen:"Ancash",fecha:"2026-04-22",precio:3},
{id:3,tipo:"Papa Huayro",vit:"Vitamina C y B6",origen:"Cusco",fecha:"2026-06-10",precio:4.2},
{id:4,tipo:"Papa Amarilla",vit:"Vitamina A y C",origen:"Huánuco",fecha:"2026-05-18",precio:5.5},
{id:5,tipo:"Papa Peruanita",vit:"Vitamina C",origen:"Ayacucho",fecha:"2026-05-25",precio:4.8},
{id:6,tipo:"Papa Negra",vit:"Antioxidantes",origen:"Puno",fecha:"2026-06-05",precio:5},
{id:7,tipo:"Papa Única",vit:"Vitamina C",origen:"Lima",fecha:"2026-04-30",precio:2.5},
{id:8,tipo:"Papa Tomasa",vit:"Vitamina B6",origen:"Huancavelica",fecha:"2026-05-12",precio:3.4},
{id:9,tipo:"Papa Tumbay",vit:"Vitamina C",origen:"Cusco",fecha:"2026-06-08",precio:6.2},
{id:10,tipo:"Papa Huamantanga",vit:"Vitamina C",origen:"Lima",fecha:"2026-05-17",precio:4.5},
{id:11,tipo:"Papa Capiro",vit:"Vitamina C",origen:"Colombia",fecha:"2026-05-20",precio:3.6},
{id:12,tipo:"Papa Criolla",vit:"Vitamina A",origen:"Colombia",fecha:"2026-04-14",precio:5.8},
{id:13,tipo:"Papa Russet",vit:"Vitamina C",origen:"USA",fecha:"2026-05-28",precio:4},
{id:14,tipo:"Papa Yukon Gold",vit:"Vitamina B6",origen:"Canadá",fecha:"2026-06-06",precio:5.2},
{id:15,tipo:"Papa Roja Norland",vit:"Vitamina B1",origen:"Canadá",fecha:"2026-05-19",precio:4.7},
{id:16,tipo:"Papa Atlantic",vit:"Vitamina C",origen:"USA",fecha:"2026-04-24",precio:3.9},
{id:17,tipo:"Papa Desiree",vit:"Vitamina B6",origen:"Holanda",fecha:"2026-06-03",precio:4.3},
{id:18,tipo:"Papa Kennebec",vit:"Vitamina C",origen:"USA",fecha:"2026-05-16",precio:4.1},
{id:19,tipo:"Papa Andina Roja",vit:"Antioxidantes",origen:"Apurímac",fecha:"2026-06-09",precio:5.6},
{id:20,tipo:"Papa Blanca Serrana",vit:"Vitamina C",origen:"Cajamarca",fecha:"2026-06-01",precio:3.2}

];

function guardar(){
localStorage.setItem("papas",JSON.stringify(productos));
}

function cargar(){

let tabla=document.getElementById("tabla");

tabla.innerHTML="";

productos.forEach((p,index)=>{

tabla.innerHTML+=`
<tr>
<td>${p.id}</td>
<td>${p.tipo}</td>
<td>${p.vit}</td>
<td>${p.origen}</td>
<td>${p.fecha}</td>
<td>S/${p.precio}</td>

<td>
<button onclick="editar(${index})">✏️</button>
<button onclick="eliminar(${index})">🗑️</button>
</td>
</tr>
`;

});

document.getElementById("totalProductos").innerHTML=productos.length;

let prom=productos.reduce((a,b)=>a+b.precio,0)/productos.length;

document.getElementById("promedio").innerHTML=
"S/"+prom.toFixed(2);

guardar();

}

async function nuevoProducto(){

const {value:form}=await Swal.fire({

title:"Nuevo Producto",

html:`
<input id="tipo" class="swal2-input" placeholder="Tipo">
<input id="vit" class="swal2-input" placeholder="Vitaminas">
<input id="origen" class="swal2-input" placeholder="Origen">
<input id="fecha" type="date" class="swal2-input">
<input id="precio" type="number" class="swal2-input" placeholder="Precio">
`,

preConfirm:()=>{

return{

tipo:tipo.value,
vit:vit.value,
origen:origen.value,
fecha:fecha.value,
precio:Number(precio.value)

};

}

});

if(form){

productos.push({
id:Date.now(),
...form
});

cargar();

}

}

function editar(i){

let p=productos[i];

Swal.fire({

title:"Editar",

html:`
<input id="tipo" class="swal2-input" value="${p.tipo}">
<input id="vit" class="swal2-input" value="${p.vit}">
<input id="origen" class="swal2-input" value="${p.origen}">
<input id="fecha" type="date" class="swal2-input" value="${p.fecha}">
<input id="precio" type="number" class="swal2-input" value="${p.precio}">
`,

preConfirm:()=>{

p.tipo=tipo.value;
p.vit=vit.value;
p.origen=origen.value;
p.fecha=fecha.value;
p.precio=Number(precio.value);

cargar();

}

});

}

function eliminar(i){

Swal.fire({
title:"Eliminar?",
icon:"warning",
showCancelButton:true
}).then(r=>{

if(r.isConfirmed){

productos.splice(i,1);
cargar();

}

});

}

function exportarJSON(){

const blob=new Blob(
[JSON.stringify(productos,null,2)],
{type:"application/json"}
);

const a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="productos_papa.json";

a.click();

}

document.getElementById("importFile")
.addEventListener("change",(e)=>{

let file=e.target.files[0];

let reader=new FileReader();

reader.onload=()=>{

productos=JSON.parse(reader.result);

cargar();

};

reader.readAsText(file);

});

function abrirQR(){

const qr=new Html5Qrcode("reader");

qr.start(
{ facingMode:"environment" },
{ fps:10, qrbox:250 },

(texto)=>{

Swal.fire(
"QR Detectado",
texto,
"success"
);

qr.stop();

}

);

}

cargar();

</script>

</body>
</html>
